apiVersion: v1
kind: Secret
metadata:
  name: itsm-secrets
  namespace: itsm-app
type: Opaque
stringData:
  # Change in production; used for browser sessions and MCP auth
  session-secret: "replace-with-long-random-string"
  mcp-token: "replace-with-mcp-shared-secret"
  # First admin when the database is empty (ephemeral emptyDir). Omit both keys to skip bootstrap (manual recovery).
  bootstrap-admin-user: "admin"
  bootstrap-admin-password: "admin"
