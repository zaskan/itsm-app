<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in — ITSM Demo</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 min-h-screen flex items-center justify-center p-6">
  <form method="post" action="/login" class="bg-white rounded-xl shadow-2xl p-8 w-full max-w-sm space-y-6">
    <div>
      <h1 class="text-xl font-semibold text-slate-900">ITSM Demo</h1>
      <p class="text-sm text-slate-500 mt-1">Sign in to continue</p>
    </div>
    {% if request.query_params.get('error') %}
    <p class="text-sm text-red-600">Invalid username or password.</p>
    {% endif %}
    <div>
      <label class="block text-sm font-medium text-slate-700">Username</label>
      <input name="username" required autocomplete="username"
        class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500" />
    </div>
    <div>
      <label class="block text-sm font-medium text-slate-700">Password</label>
      <input type="password" name="password" required autocomplete="current-password"
        class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500" />
    </div>
    <button type="submit" class="w-full rounded-lg bg-blue-600 text-white py-2.5 text-sm font-medium hover:bg-blue-700">
      Sign in
    </button>
    <p class="text-xs text-slate-400 text-center">Demo users: admin / ansible (see users.yaml)</p>
  </form>
</body>
</html>
