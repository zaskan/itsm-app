<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in — {{ app_title }}</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen flex items-center justify-center p-6" style="{{ sidebar_style }} background: linear-gradient(155deg, var(--sidebar-bg) 0%, #0f172a 55%, #020617 100%);">
  <form method="post" action="/login" class="bg-white rounded-xl shadow-2xl w-full max-w-sm overflow-hidden">
    <div class="px-8 pt-8 pb-4" style="background-color: var(--sidebar-bg); color: var(--sidebar-text);">
      <div class="flex items-center gap-3">
        {% if branding.logo_url %}
        <img src="{{ branding.logo_url }}" alt="" width="40" height="40" class="h-10 w-10 object-contain shrink-0" />
        {% endif %}
        <div>
          <h1 class="text-xl font-semibold tracking-tight">{{ app_title }}</h1>
          <p class="text-sm opacity-80 mt-0.5">Sign in to continue</p>
        </div>
      </div>
    </div>
    <div class="p-8 space-y-6">
    {% if request.query_params.get('error') %}
    <p class="text-sm text-red-600">Invalid username or password.</p>
    {% endif %}
    <div>
      <label class="block text-sm font-medium text-slate-700">Username</label>
      <input name="username" required autocomplete="username"
        class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500" />
    </div>
    <div>
      <label class="block text-sm font-medium text-slate-700">Password</label>
      <input type="password" name="password" required autocomplete="current-password"
        class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500" />
    </div>
    <button type="submit" class="w-full rounded-lg bg-blue-600 text-white py-2.5 text-sm font-medium hover:bg-blue-700">
      Sign in
    </button>
    <p class="text-xs text-slate-400 text-center">Use an account created by your administrator (bootstrap via env on first install).</p>
    </div>
  </form>
</body>
</html>
