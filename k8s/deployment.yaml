apiVersion: apps/v1
kind: Deployment
metadata:
  name: itsm-app
  namespace: itsm-app
  labels:
    app: itsm-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: itsm-app
  template:
    metadata:
      labels:
        app: itsm-app
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: itsm-app
          image: image-registry.openshift-image-registry.svc:5000/itsm-app/itsm-app:latest
          # Always pull after oc start-build so :latest points at a new digest
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            runAsNonRoot: true
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: ITSM_DATABASE
              value: /data/itsm.db
            - name: SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: itsm-secrets
                  key: session-secret
            - name: MCP_TOKEN
              valueFrom:
                secretKeyRef:
                  name: itsm-secrets
                  key: mcp-token
            # Used only when the SQLite file has zero users (first pod start with emptyDir).
            - name: ITSM_BOOTSTRAP_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: itsm-secrets
                  key: bootstrap-admin-user
                  optional: true
            - name: ITSM_BOOTSTRAP_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: itsm-secrets
                  key: bootstrap-admin-password
                  optional: true
          volumeMounts:
            - name: sqlite-data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
      volumes:
        - name: sqlite-data
          emptyDir: {}
